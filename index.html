            const imgElem = document.getElementById("homeProfileImg");
            if (imgElem) {
              imgElem.src = ev.target.result;
              saveProfileImage(ev.target.result);
            }
          };
          reader.readAsDataURL(file);
        }
      });
    }

    function attachNavHandlers() {
      const btns = ["#gotoAbout", "#gotoSkills", "#gotoLogin", "#homeConnectBtn", "#contactConnectTrigger"];
      btns.forEach(selector => {
        const btn = document.querySelector(selector);
        if (!btn) return;
        btn.removeEventListener("click", window._navHandler);
        window._navHandler = (e) => {
          e.preventDefault();
          const id = btn.id;
          if (id === "gotoAbout") currentPage = "about";
          else if (id === "gotoSkills") currentPage = "skills";
          else currentPage = "login";
          renderPage();
          window.history.pushState({}, "", `#${currentPage}`);
        };
        btn.addEventListener("click", window._navHandler);
      });
    }

    function renderPage() {
      if (isRendering) return;
      isRendering = true;
      const appRoot = document.getElementById("app-root");
      if (!appRoot) return;
      let content = "";
      if (currentPage === "home") content = HomePage();
      else if (currentPage === "about") content = AboutPage();
      else if (currentPage === "skills") content = SkillsPage();
      else if (currentPage === "contact") content = ContactPage();
      else content = LoginPage();
      appRoot.innerHTML = content;
      if (currentPage === "home") attachImageUpload();
      attachNavHandlers();
      updateActiveNav();
      if (window.gsap) {
        gsap.fromTo(".flashcard, .skill-card", { opacity: 0, y: 20 }, { opacity: 1, y: 0, duration: 0.5, stagger: 0.05, clearProps: "all" });
      }
      isRendering = false;
    }

    function setupRouting() {
      const navLinks = document.querySelectorAll(".nav-link");
      navLinks.forEach(link => {
        link.addEventListener("click", (e) => {
          e.preventDefault();
          const page = link.getAttribute("data-page");
          if (page) { currentPage = page; renderPage(); window.history.pushState({}, "", `#${page}`); }
        });
      });
      window.addEventListener("popstate", () => {
        const hash = window.location.hash.slice(1);
        if (["home","about","skills","contact","login"].includes(hash)) currentPage = hash;
        else currentPage = "home";
        renderPage();
      });
      const initHash = window.location.hash.slice(1);
      if (initHash && ["home","about","skills","contact","login"].includes(initHash)) currentPage = initHash;
      renderPage();
    }
    setupRouting();
  })();
</script>
</body>
</html>
