    * {

      padding: 0;
      box-sizing: border-box;
    }

    }

      flex-wrap: wrap;
      justify-content: space-between;
      align-items: center;
      gap: 1rem;
      border-bottom: 2px solid #ffd966;
    }

    .logo {
      font-weight: 800;
      font-size: 1.7rem;
      color: #ffffff;
      letter-spacing: -0.3px;
    }
    .logo i {
      color: #ffd966;
      margin-right: 8px;
    }

    .nav-links {
      display: flex;
      gap: 2.2rem;
    }

      font-weight: 600;
      color: #f0f4fa;
      transition: 0.3s;
      font-size: 1rem;
      padding: 0.5rem 0;
      position: relative;
    }
    .nav-links a::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 0%;
      height: 2.5px;
      background: #ffd966;
      transition: 0.3s cubic-bezier(0.68, -0.55, 0.265, 1.55);
    }
    .nav-links a:hover::after, .nav-links a.active::after {
      width: 100%;
    }
    .nav-links a:hover, .nav-links a.active {
      color: #ffefb9;
      transform: translateY(-2px);
    }
    .btn-primary, .btn-outline {

      font-weight: 600;
      transition: all 0.3s ease;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 0.7rem 1.6rem;
      cursor: pointer;
      text-decoration: none;

      border: none;

      color: #2a5f8a;

      padding: 2rem 2.5rem 4rem;

      align-items: center;
      justify-content: center;
      margin-bottom: 1rem;

      position: relative;

      height: 100%;

      object-position: center;
      display: block;
      transition: transform 0.4s;
      background: transparent;

      justify-content: center;
      width: 100%;

</head>

    `;
  }

  let currentPage = "home";

  function renderPage() {
    const appRoot = document.getElementById("app-root");
    if (!appRoot) return;
    let content = "";
    switch(currentPage) {
      case "home": content = HomePage(); break;
      case "about": content = AboutPage(); break;
      case "skills": content = SkillsPage(); break;
      case "contact": content = ContactPage(); break;
      case "login": content = LoginPage(); break;
      default: content = HomePage();
    }
    appRoot.innerHTML = content;
    if (currentPage === "home") {
      const avatarDiv = document.getElementById("homeAvatarContainer");
      if (avatarDiv && !document.getElementById("homeUploadBtn")) {
        const uploadBtn = document.createElement("button");
        uploadBtn.id = "homeUploadBtn";
        uploadBtn.innerHTML = '<i class="fas fa-camera"></i> Change My Photo';
        uploadBtn.className = "btn-outline";
        uploadBtn.style.marginTop = "15px";
        uploadBtn.style.fontSize = "0.85rem";
        uploadBtn.style.padding = "0.5rem 1.2rem";
        const parent = avatarDiv.parentNode;
        const wrapper = document.createElement("div");
        wrapper.style.display = "flex";
        wrapper.style.flexDirection = "column";
        wrapper.style.alignItems = "center";
        avatarDiv.parentNode.insertBefore(wrapper, avatarDiv);
        wrapper.appendChild(avatarDiv);
        wrapper.appendChild(uploadBtn);
        const fileInput = document.createElement("input");
        fileInput.type = "file";
        fileInput.accept = "image/*";
        fileInput.style.display = "none";
        fileInput.id = "homeFileInput";
        wrapper.appendChild(fileInput);
        uploadBtn.addEventListener("click", () => fileInput.click());
        fileInput.addEventListener("change", (e) => {
          const file = e.target.files[0];
          if (file) {
            const reader = new FileReader();
            reader.onload = (ev) => {
              const imgElem = document.getElementById("homeProfileImg");
              if (imgElem) {
                const imageDataUrl = ev.target.result;
                imgElem.src = imageDataUrl;
                // Save to localStorage so it persists across page changes and refreshes
                saveProfileImage(imageDataUrl);
              }
            };
            reader.readAsDataURL(file);
          }
        });
      }
    }
    if (currentPage === "login") {
      const form = document.getElementById("connectForm");
      if (form) {
        form.addEventListener("submit", (e) => {
          e.preventDefault();
          const name = document.getElementById("connName").value.trim();
          const email = document.getElementById("connEmail").value.trim();
          const pass = document.getElementById("connPassword").value.trim();
          const phone = document.getElementById("connPhone").value.trim();
          const msgDiv = document.getElementById("connectMsg");
          if (!name || !email || !pass || !phone) {
            msgDiv.innerHTML = "<span style='color:#b91c1c;'>❌ All fields required.</span>";
            return;
          }
          if (!email.includes("@")) { msgDiv.innerHTML = "<span style='color:#b91c1c;'>❌ Valid email needed.</span>"; return; }
          localStorage.setItem("ayan_lead_" + Date.now(), JSON.stringify({name, email, phone}));
          msgDiv.innerHTML = `<div style="background:#d4e4ff; padding:0.8rem; border-radius:24px;">✅ Thanks ${name}! Ayan will contact you at ${phone} / ${email}. Meanwhile call ${personalPhone}</div>`;
          form.reset();
          document.getElementById("connPhone").value = "+91";
        });
      }
    }

    // Navigation handlers
    document.querySelectorAll("#gotoAbout").forEach(btn => btn.addEventListener("click", (e) => { e.preventDefault(); currentPage = "about"; renderPage(); window.history.pushState({},"","#about"); updateActiveNav(); }));
    document.querySelectorAll("#gotoSkills").forEach(btn => btn.addEventListener("click", (e) => { e.preventDefault(); currentPage = "skills"; renderPage(); window.history.pushState({},"","#skills"); updateActiveNav(); }));
    document.querySelectorAll("#gotoLogin, #homeConnectBtn, #contactConnectTrigger").forEach(btn => {
      if(btn) btn.addEventListener("click", (e) => { e.preventDefault(); currentPage = "login"; renderPage(); window.history.pushState({},"","#login"); updateActiveNav(); });
    });

    gsap.fromTo(".flashcard, .skill-card", 
      { opacity: 0, y: 35 }, 
      { opacity: 1, y: 0, duration: 0.7, stagger: 0.08, ease: "back.out(0.5)" }
    );
    updateActiveNav();
  }

  function updateActiveNav() {
    document.querySelectorAll(".nav-link").forEach(link => {
      const pg = link.getAttribute("data-page");
      if (pg === currentPage) link.classList.add("active");
      else link.classList.remove("active");
    });
  }

  function setupRouting() {
    document.querySelectorAll(".nav-link").forEach(link => {
      link.addEventListener("click", (e) => {
        e.preventDefault();
        const page = link.getAttribute("data-page");
        if (page) { currentPage = page; renderPage(); window.history.pushState({}, "", `#${page}`); }
      });
    });
    window.addEventListener("popstate", () => {
      const hash = window.location.hash.slice(1);
      if (["home","about","skills","contact","login"].includes(hash)) currentPage = hash;
      else currentPage = "home";
      renderPage();
    });
    const initHash = window.location.hash.slice(1);
    if (initHash && ["home","about","skills","contact","login"].includes(initHash)) currentPage = initHash;
    renderPage();
  }

  setupRouting();
</script>
</body>
</html>
